---
version: 2

updates:
  - package-ecosystem: "npm"
    assignees:
      - "JanaME"
    commit-message:
      prefix: "chore"
      include: "scope"
    directory: "/npm-package/"
    open-pull-requests-limit: 10
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Berlin"

  - package-ecosystem: "npm"
    assignees:
      - "JanaME"
    commit-message:
      prefix: "chore"
      include: "scope"
    directory: "/wp-plugin/"
    open-pull-requests-limit: 10
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Berlin"

  - package-ecosystem: "github-actions"
    assignees:
      - "JanaME"
    directory: "/.github/"
    open-pull-requests-limit: 10
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Berlin"
