name: PR

on:
  pull_request:
    branches:
      - main

jobs:
  npm-package:
    name: NPM package (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - run: npm ci
        working-directory: npm-package

      - run: npm run build
        working-directory: npm-package

      - run: npm test
        working-directory: npm-package

  wp-plugin:
    name: Plugin assets (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - run: npm ci
        working-directory: wp-plugin

      - run: npm run build
        working-directory: wp-plugin
