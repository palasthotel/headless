name: Update plugin version

on:
  pull_request_target:
    types: [opened, synchronize]
    branches:
      - main

permissions:
  contents: write

jobs:
  update-plugin-version:
    # Only run for the release-please plugin component PR
    if: startsWith(github.head_ref, 'release-please--') && contains(github.head_ref, '--plugin')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24.x

      - name: Update Stable tag and changelog in README.txt and Version in headless.php
        run: bash bin/update-plugin-version.sh

      - name: Commit to release PR branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wp-plugin/public/README.txt wp-plugin/public/headless.php
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(plugin): update README.txt and headless.php"
          git push
